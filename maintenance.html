<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trnavský jarmok 2026 – Čoskoro</title>
  <meta name="description" content="Trnavský jarmok 2026 – 11.–14. septembra, Trnava. Čoskoro!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #0a0d1a 0%, #162040 40%, #0083B7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--white);
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: url('https://picsum.photos/1920/1080?random=90') center/cover no-repeat;
      opacity: 0.08;
      pointer-events: none;
    }
    .maintenance {
      position: relative;
      z-index: 1;
      max-width: 700px;
      width: 100%;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 2rem;
    }
    .logo-mark {
      width: 72px; height: 72px;
      background: var(--blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--white);
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 0 8px rgba(0,131,183,0.2);
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    h1 span { color: var(--yellow); }
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    /* Countdown */
    .countdown {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }
    .countdown__unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .countdown__value {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 0.75rem 1.25rem;
      min-width: 100px;
      text-align: center;
    }
    .countdown__label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.6;
    }
    /* Social */
    .social-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .social-link {
      width: 48px; height: 48px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .social-link:hover { border-color: var(--yellow); color: var(--yellow); }
    /* Contact */
    .contact {
      font-size: 0.9rem;
      opacity: 0.6;
    }
    .contact a { color: rgba(255,255,255,0.7); }
    .contact a:hover { color: var(--yellow); }
    /* Floating stars */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--white);
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--opacity); }
    }
  </style>
</head>
<body>
  <!-- Stars -->
  <div class="stars" aria-hidden="true" id="stars"></div>

  <div class="maintenance">
    <div class="logo-mark">TJ</div>
    <div class="badge">Trnavský jarmok 2026</div>
    <h1>Čoskoro<br><span>v Trnave</span></h1>
    <p class="subtitle">
      Pripravujeme pre vás výnimočný jarmok.<br>
      11.–14. septembra 2026, centrum Trnavy
    </p>

    <!-- Countdown -->
    <div class="countdown" id="countdown" aria-live="polite">
      <div class="countdown__unit">
        <div class="countdown__value" id="cd-days">--</div>
        <div class="countdown__label">Dní</div>
      </div>
      <div class="countdown__unit">
        <div class="countdown__value" id="cd-hours">--</div>
        <div class="countdown__label">Hodín</div>
      </div>
      <div class="countdown__unit">
        <div class="countdown__value" id="cd-minutes">--</div>
        <div class="countdown__label">Minút</div>
      </div>
      <div class="countdown__unit">
        <div class="countdown__value" id="cd-seconds">--</div>
        <div class="countdown__label">Sekúnd</div>
      </div>
    </div>

    <!-- Social -->
    <div class="social-row">
      <a href="#" class="social-link" aria-label="Facebook" onclick="return false;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="Instagram" onclick="return false;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
      <a href="#" class="social-link" aria-label="YouTube" onclick="return false;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.97C18.88 4 12 4 12 4s-6.88 0-8.59.45A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg>
      </a>
    </div>

    <div class="contact">
      Otázky? <a href="mailto:info@jarmok.trnava.sk">info@jarmok.trnava.sk</a>
      &nbsp;·&nbsp;
      <a href="https://www.trnava.sk" target="_blank" rel="noopener">trnava.sk</a>
    </div>
  </div>

  <script>
    // Countdown
    const target = new Date('2026-09-11T10:00:00');
    function updateCountdown() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        document.getElementById('cd-days').textContent = '0';
        document.getElementById('cd-hours').textContent = '0';
        document.getElementById('cd-minutes').textContent = '0';
        document.getElementById('cd-seconds').textContent = '0';
        return;
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-minutes').textContent = String(mins).padStart(2, '0');
      document.getElementById('cd-seconds').textContent = String(secs).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${2 + Math.random() * 4}s;
        --opacity: ${0.3 + Math.random() * 0.7};
        animation-delay: ${Math.random() * 4}s;
      `;
      starsEl.appendChild(s);
    }
  </script>
</body>
</html>
